spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate   # Never use 'update' in real prod

server:
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
  tomcat:
    threads:
      max: 300   # Tune based on load

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics   # Remove prometheus if not using
  endpoint:
    health:
      show-details: never   # Hide details in public

logging:
  level:
    root: WARN
    com.nakshatra: INFO