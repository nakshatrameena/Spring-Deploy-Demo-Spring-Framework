# Server Configuration
server.port=8081

# DataSource Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver

spring.datasource.username=sa
# Must match the 'Lockdown' command in your schema.sql
spring.datasource.password=

# Point to a setup script (we will create this next)
spring.datasource.continue-on-error=true
spring.sql.init.mode=always

# Allows the H2 interface to appear inside the browser frame
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false
# Prevents Spring Security from blocking the H2 UI frames
spring.security.headers.frame-options.disable=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console Configuration
# This enables the web interface at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate Settings
# 'update' will create the USERS table automatically based on your User entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security Settings (Optional but helpful for debugging)
# This ensures that the H2 console doesn't conflict with Spring Security frames
spring.main.allow-bean-definition-overriding=true